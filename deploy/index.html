<!doctype html>
<html lang="en" data-jects-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jects UI — Enterprise Planning &amp; Data UI Suite</title>
    <meta
      name="description"
      content="Jects UI — a framework-agnostic enterprise planning and data UI suite: grids, scheduling, Gantt, dashboards, diagrams, spreadsheets, forms, and productivity workflows."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Theme + token contract (light + dark + high-contrast + branded). all.css
         @imports base/dark/high-contrast/branded. Theme fonts fall back to the
         system-ui stack, so no external font CDN is required. -->
    <link rel="stylesheet" href="./packages/theme/dist/css/all.css" />
    <!-- The theme tokens + the gallery shell stay EAGER so the chrome is never
         unstyled. Every per-component stylesheet (widgets/grid/charts/pivot/…)
         is now lazy-loaded PER ROUTE via ensureCss() in gallery.js — injected
         into <head> the first time a route that needs it is visited, so the
         initial page load no longer downloads ~14 component stylesheets. -->
    <!-- Gallery chrome (uses house tokens itself). -->
    <link rel="stylesheet" href="./gallery.css" />

    <!-- Resolve the bare @jects/* specifiers the built ESM dist files import
         from each other to the already-built dist ESM entries. -->
    <script type="importmap">
      {
        "imports": {
          "@jects/core": "./packages/core/dist/core.js",
          "@jects/tokens": "./packages/tokens/dist/index.js",
          "@jects/theme": "./packages/theme/dist/theme.js",
          "@jects/icons": "./packages/icons/dist/icons.js",
          "@jects/widgets": "./packages/widgets/dist/widgets.js",
          "@jects/grid": "./packages/grid/dist/grid.js",
          "@jects/charts": "./packages/charts/dist/charts.js",
          "@jects/pivot": "./packages/pivot/dist/pivot.js",
          "@jects/spreadsheet": "./packages/spreadsheet/dist/spreadsheet.js",
          "@jects/timeline-core": "./packages/timeline-core/dist/timeline-core.js",
          "@jects/scheduler": "./packages/scheduler/dist/scheduler.js",
          "@jects/gantt": "./packages/gantt/dist/gantt.js",
          "@jects/calendar": "./packages/calendar/dist/calendar.js",
          "@jects/kanban": "./packages/kanban/dist/kanban.js",
          "@jects/diagram": "./packages/diagram/dist/diagram.js",
          "@jects/todo": "./packages/todo/dist/todo.js",
          "@jects/booking": "./packages/booking/dist/booking.js",
          "@jects/chatbot": "./packages/chatbot/dist/chatbot.js"
        }
      }
    </script>
  </head>
  <body class="jects-scope">
    <div id="gallery"></div>
    <script type="module" src="./gallery.js"></script>
  </body>
</html>
