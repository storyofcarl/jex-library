name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *' # nightly broad browser + bench + visual smoke

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: No derivative/replica framing
        run: |
          if grep -rniE "replica|replicates|combined surface of|merged surface|covers everything (that )?(bryntum|dhtmlx)|=(bryntum|dhtmlx) origin|\[(b|d)\]\[(b|d)\]|bryntum [+] dhtmlx" \
               --include='*.md' --include='*.json' --include='*.html' --include='*.ts' --include='*.js' \
               --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git . \
               | grep -vE "do not frame|forbidding derivative|derivative framing" ; then
            echo "::error::Derivative/replica framing found in repo text. Use enterprise-suite language; competitors only in controlled comparison matrices."
            exit 1
          fi
          echo "OK: no derivative framing."
      - name: HTML-safety guard (no unguarded innerHTML)
        run: pnpm security:html
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Capability matrix is up to date
        run: |
          pnpm matrix
          git diff --exit-code docs/MATRIX.md docs/matrix.json \
            || (echo "::error::docs/MATRIX.md / matrix.json is stale — run 'pnpm build && pnpm matrix' and commit." && exit 1)

  browser-a11y:
    name: browser + a11y (Chromium)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      # Representative data-heavy packages on every PR (incl. a11y specs).
      - run: pnpm --filter @jects/widgets --filter @jects/grid --filter @jects/gantt --filter @jects/scheduler --filter @jects/calendar test:browser

  nightly:
    name: nightly — all browser/a11y + bench + visual smoke
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      # Every package that ships browser/a11y specs.
      - run: pnpm -r --if-present test:browser
      - name: Performance benchmark
        run: pnpm bench
      - name: Visual smoke (routes × viewports × themes)
        run: pnpm visual
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-smoke
          path: |
            artifacts/visual/**
            docs/PERFORMANCE.md
